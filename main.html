<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jeopardy Game</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>
        <h1>JEOPARDY!</h1>
        <p>Click a dollar amount to reveal the clue.</p>
    </header>

    <section id="player-setup">
        <input type="text" id="player1-name" placeholder="Player 1 Name">
        <input type="text" id="player2-name" placeholder="Player 2 Name">
        <button id="start">Restart Game</button>
    </section>

    <p id="message"></p>

    <section id="scoreboard"></section>

    <main id="game-board"></main>

    <script src="script.js"></script>

</body>

</html>
